{% extends 'base.html' %}

{% block content %}

<h1>Users</h1>

<section class="user-list">
  <ul>
    {% for user in users %}
    <li>
      <h3>{{ user.name }}</h3>
      <a
          class="btn"
          href="{{ url_for('get_movies', user_id=user.id) }}"
      >
        View Movies
      </a>
    </li>
    {% endfor %}
  </ul>
</section>

<section class="user-form">
  <form action="{{ url_for('create_user') }}" method="POST">
    <h2><label for="name">Add New User</label></h2>
    <input type="text" id="name" name="name" placeholder="User name"/>
    <input type="submit" value="Add User"/>
  </form>
</section>
{% endblock %}
